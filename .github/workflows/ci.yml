name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Two artifacts have to exist before lint/typecheck can resolve imports:
      #   - @prisma/client (Prisma's postinstall is blocked by pnpm 10 by default)
      #   - @edb/shared dist/ (consumers import via the package's "exports" field)
      - name: Generate Prisma client
        run: pnpm --filter @edb/api exec prisma generate

      - name: Build @edb/shared
        run: pnpm --filter @edb/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        # `pretest` hook spins up db + redis via docker compose, applies
        # migrations and seeds the admin before vitest runs.
        run: pnpm test
