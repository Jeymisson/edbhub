services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edbhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_dev}
      POSTGRES_DB: ${POSTGRES_DB:-edbhub}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edbhub} -d ${POSTGRES_DB:-edbhub}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://edbhub:changeme_in_dev@db:5432/edbhub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_PORT: ${API_PORT:-3000}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-edb_sid}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@escoladobreno.test}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-AdminTest123!}
      NODE_ENV: production
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${API_PORT:-3000}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  db-data:
